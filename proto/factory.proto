syntax = "proto3";
package factory;

// FactoryService provides factory operations for deploying agents.
service FactoryService {
  // Deploy deploys an application from a JSON configuration.
  rpc Deploy(DeployRequest) returns (DeployResponse);
}

message DeployRequest {
  // config holds the JSON configuration content for the application to deploy.
  string config = 1;
}

message DeployResponse {
  string agent_id = 1;
  string message = 2;
  string error = 3;
  string application_id = 4;
}
